name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Fast checks (every PR and push) ───────────────────────────────────────
  # No Docker, no Playwright, no xvfb.
  # Unit tests (tsx) + workflow tests (tsx, in-memory storage, no Electron).
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y -qq build-essential cmake libblas-dev liblapack-dev \
                           xvfb xauth alsa-utils python3 python-is-python3 \
                           libgtk-3-0t64 libgbm1 libasound2t64 libasound2-dev
        npm ci --ignore-scripts
        node node_modules/electron/install.js

    - name: Build native addons
      run: npm run rebuild

    - name: Lint
      run: npm run lint

    - name: Build electron
      run: npm run build:electron

    - name: Test
      run: npm run test:coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage/lcov.info
        flags: unittests
        fail_ci_if_error: false

  # ── Integration tests (push to main only) ─────────────────────────────────
  # Full Playwright suite via Docker + xvfb. PRs are not blocked by this job.
  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Run integration tests (Docker)
      run: ./build.sh

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
