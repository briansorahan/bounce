<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'"
    />
    <title>Bounce - FluCoMa Audio Editor</title>
    <link rel="stylesheet" href="../xterm/xterm/css/xterm.css" />
    <script type="importmap">
      {
        "imports": {
          "@xterm/xterm": "../xterm/xterm/lib/xterm.mjs",
          "@xterm/addon-fit": "../xterm/addon-fit/lib/addon-fit.mjs"
        }
      }
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #1e1e1e;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      #terminal {
        flex: 1;
        min-height: 0;
        background: #1e1e1e;
        overflow: hidden;
      }

      #divider {
        display: none;
        flex: none;
        height: 6px;
        background: #333;
        cursor: row-resize;
        transition: background 0.15s;
      }

      #divider:hover,
      #divider.dragging {
        background: #555;
      }

      body.waveform-visible #terminal,
      body.visualization-visible #terminal {
        flex: none;
        height: 60vh;
        min-height: 60px;
      }

      body.waveform-visible #divider,
      body.visualization-visible #divider {
        display: block;
      }

      #visualization-area {
        flex: 1 1 auto;
        display: none;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        padding: 12px;
        background: #252525;
        overflow: auto;
      }

      body.waveform-visible #visualization-area,
      body.visualization-visible #visualization-area {
        display: flex;
      }

      #waveform-container {
        display: none;
        position: relative;
        min-height: 220px;
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 8px;
      }

      #waveform-container.active {
        display: block;
      }

      #waveform-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      #visualization-stack {
        display: none;
        flex: 1 1 auto;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
      }

      body.visualization-visible #visualization-stack {
        display: flex;
      }

      .visualization-scene {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px;
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 8px;
      }

      .visualization-scene-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .visualization-scene-title,
      .visualization-scene-panel-title {
        color: #d4d4d4;
        font-size: 13px;
        font-family: Menlo, Monaco, "Courier New", monospace;
      }

      .visualization-scene-close {
        border: 1px solid #555;
        border-radius: 4px;
        background: #252525;
        color: #d4d4d4;
        padding: 4px 8px;
        cursor: pointer;
      }

      .visualization-scene-close:hover {
        background: #333;
      }

      .visualization-scene-waveform {
        position: relative;
        min-height: 220px;
        background: #252525;
        border-radius: 6px;
        overflow: hidden;
      }

      .visualization-scene-waveform-canvas {
        width: 100%;
        height: 220px;
        display: block;
      }

      .visualization-scene-panels {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .visualization-scene-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 10px;
        background: #252525;
        border-radius: 6px;
      }

      .visualization-scene-panel-canvas {
        width: 100%;
        min-height: 320px;
        background: #1a1a1a;
        border-radius: 4px;
        overflow: hidden;
      }

      .visualization-scene-panel-canvas canvas {
        width: 100%;
        height: 320px;
        display: block;
      }

      #status-line {
        flex: none;
        height: 24px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        background: #181818;
        border-top: 1px solid #333;
        font-family: Menlo, Monaco, "Courier New", monospace;
        font-size: 12px;
        color: #888;
        overflow: hidden;
        white-space: nowrap;
      }

      #status-line .status-indicator {
        font-size: 10px;
        line-height: 1;
      }

      #status-line .status-indicator.ok {
        color: #0dbc79;
      }

      #status-line .status-indicator.error {
        color: #cd3131;
      }

      #status-line .status-text {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>
    <div id="divider"></div>
    <div id="visualization-area">
      <div id="waveform-container">
        <canvas id="waveform-canvas"></canvas>
      </div>
      <div id="visualization-stack"></div>
    </div>
    <div id="status-line">
      <span class="status-indicator ok">●</span>
      <span class="status-text">Ready</span>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
